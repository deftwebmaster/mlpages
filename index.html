<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matt Livingston - Web Developer | Tool Builder | Systems Designer</title>
  
<head>
  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Matt Livingston: Web Developer, Tool Builder, Systems Designer</title>
  <meta name="description" content="Matt Livingston builds sharp, purpose-driven web tools and systems. Focused on clarity, performance, and practical execution—no fluff, just tools that work." />

  <!-- Open Graph (Facebook, iMessage, LinkedIn, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mattlivingston.com/" />
  <meta property="og:title" content="Matt Livingston: Web Developer, Tool Builder, Systems Designer" />
  <meta property="og:description" content="Matt Livingston builds sharp, purpose-driven web tools and systems. Focused on clarity, performance, and practical execution—no fluff, just tools that work." />
  <meta property="og:image" content="https://mattlivingston.com/card.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://mattlivingston.com/" />
  <meta name="twitter:title" content="Matt Livingston: Web Developer, Tool Builder, Systems Designer" />
  <meta name="twitter:description" content="Matt Livingston builds sharp, purpose-driven web tools and systems. Focused on clarity, performance, and practical execution—no fluff, just tools that work." />
  <meta name="twitter:image" content="https://mattlivingston.com/card.png" />

  <!-- Optional: Theme color for mobile previews -->
  <meta name="theme-color" content="#0b0f1a" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <style>

    /* ─── TOKENS ────────────────────────────────────────────── */
    :root {
      --bg:          #080a10;
      --border:      #181c2a;
      --border-mid:  #222740;

      --cyan:        #22d3ee;
      --cyan-dim:    #0e7490;
      --cyan-glow:   rgba(34,211,238,0.22);

      --violet:      #a78bfa;
      --violet-mid:  #6d28d9;
      --violet-glow: rgba(167,139,250,0.2);

      --text:        #c8ccd8;
      --text-dim:    #4e5368;
      --text-muted:  #282c3c;
      --white:       #eef0f6;
    }

    /* ─── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ─── ATMOSPHERE ────────────────────────────────────────── */
    .bg-violet-orb {
      position: fixed;
      top: -8vh; left: 50%;
      transform: translateX(-50%);
      width: min(680px, 150vw);
      height: min(680px, 150vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(109,40,217,0.2) 0%, rgba(76,29,149,0.06) 45%, transparent 68%);
      pointer-events: none; z-index: 0;
    }

    .bg-cyan-orb {
      position: fixed;
      bottom: -12vh; left: 50%;
      transform: translateX(-50%);
      width: min(480px, 110vw);
      height: min(360px, 80vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34,211,238,0.09) 0%, transparent 62%);
      pointer-events: none; z-index: 0;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 56px 56px;
      opacity: 0.38;
      pointer-events: none; z-index: 0;
    }

    .bg-grain {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      opacity: 0.022;
      pointer-events: none; z-index: 0;
    }

    /* ─── LAYOUT — mobile first ─────────────────────────────── */
    .stage {
      position: relative; z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: 22px 18px 24px;
    }

    @media (min-width: 600px) {
      .stage { padding: 34px 40px; max-width: 780px; margin: 0 auto; width: 100%; }
    }
    @media (min-width: 1024px) {
      .stage { padding: 48px 60px; max-width: 900px; }
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.05s forwards;
    }

    .wordmark {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .wordmark em { font-style: normal; color: var(--cyan); }

    .online {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .pulse-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 0 rgba(34,211,238,0.6);
      animation: ripple 2.8s ease-in-out infinite;
    }

    @keyframes ripple {
      0%  { box-shadow: 0 0 0 0   rgba(34,211,238,0.6); }
      60% { box-shadow: 0 0 0 7px rgba(34,211,238,0);   }
      100%{ box-shadow: 0 0 0 0   rgba(34,211,238,0);   }
    }

    /* ─── MAIN ──────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 0 40px;
    }

    /* ─── LOGO ──────────────────────────────────────────────── */
    .logo-wrap {
      position: relative;
      width:  clamp(136px, 38vw, 180px);
      height: clamp(136px, 38vw, 180px);
      margin-bottom: 32px;
      opacity: 0;
      animation: scaleIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.18s forwards;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.84); }
      to   { opacity: 1; transform: scale(1); }
    }

    .ring-outer {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 1px solid var(--border-mid);
      animation: cw 28s linear infinite;
    }
    .ring-outer::before {
      content: '';
      position: absolute;
      top: -2px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan), 0 0 22px var(--cyan);
    }

    .ring-inner {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.22);
      animation: ccw 14s linear infinite;
    }
    .ring-inner::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--violet);
      box-shadow: 0 0 8px var(--violet), 0 0 18px var(--violet);
    }

    @keyframes cw  { to { transform: rotate(360deg);  } }
    @keyframes ccw { to { transform: rotate(-360deg); } }

    .logo-disc {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 35%, #141828, #09090f);
      border: 1px solid var(--border-mid);
      overflow: hidden;
    }
    .logo-disc::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse at 50% -5%, rgba(167,139,250,0.22), transparent 60%);
    }
    .logo-disc::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%;
      width: 80%; height: 35%;
      background: radial-gradient(ellipse at 50% 110%, rgba(34,211,238,0.12), transparent 65%);
      border-radius: 50%;
    }

    .logo-img {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 8%;
      padding: 9px;
      display: block;
      filter: drop-shadow(0 6px 16px rgba(34,211,238,0.14));
      transition: filter 0.4s ease, transform 0.4s ease;
    }
    .logo-wrap:hover .logo-img {
      filter:
        drop-shadow(0 6px 28px rgba(34,211,238,0.38))
        drop-shadow(0 0 38px rgba(167,139,250,0.22));
      transform: scale(1.04);
    }

    /* ─── NAME ──────────────────────────────────────────────── */
    .name {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(34px, 9.5vw, 64px);
      letter-spacing: -0.025em;
      line-height: 1.0;
      color: var(--white);
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.52s ease 0.36s forwards;
    }

    /* Matt = cyan, L = violet, ivingston = white (inherits) */
    .name .n-matt { color: var(--cyan); }
    .name .n-l    { color: var(--violet); }

    /* ─── TAGLINE ────────────────────────────────────────────── */
    .tagline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(10px, 2.6vw, 12px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      line-height: 2;
      opacity: 0;
      animation: fadeUp 0.52s ease 0.5s forwards;
    }

    .sep { color: var(--cyan-dim); margin: 0 6px; opacity: 0.55; }

    @media (max-width: 390px) {
      .sep   { display: none; }
      .titem { display: block; }
    }

    /* ─── RULE ──────────────────────────────────────────────── */
    .rule {
      width: 44px; height: 1px;
      margin: 28px auto;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.6s forwards;
    }

    /* ─── BUTTONS ────────────────────────────────────────────── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 300px;
      opacity: 0;
      animation: fadeUp 0.52s ease 0.7s forwards;
    }

    @media (min-width: 520px) {
      .btn-group {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        max-width: none;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 22px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }

    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 38%, rgba(255,255,255,0.05) 50%, transparent 62%);
      transform: translateX(-120%);
      transition: transform 0.55s ease;
    }
    .btn:hover::after { transform: translateX(120%); }
    .btn:hover        { transform: translateY(-2px); }
    .btn:active       { transform: translateY(0); transition-duration: 0.08s; }

    /* Cyan — Tools */
    .btn-cyan {
      background: rgba(34,211,238,0.08);
      color: var(--cyan);
      border: 1px solid var(--cyan-dim);
    }
    .btn-cyan:hover {
      background: rgba(34,211,238,0.13);
      border-color: var(--cyan);
      color: #67e8f9;
      box-shadow: 0 0 26px var(--cyan-glow), inset 0 0 12px rgba(34,211,238,0.04);
    }

    /* Violet — Gravity Falls */
    .btn-violet {
      background: rgba(167,139,250,0.07);
      color: var(--violet);
      border: 1px solid rgba(109,40,217,0.45);
    }
    .btn-violet:hover {
      background: rgba(167,139,250,0.12);
      border-color: var(--violet);
      color: #c4b5fd;
      box-shadow: 0 0 24px var(--violet-glow);
    }

    /* Game — solid-fill violet so it pops */
    .btn-game {
      background: rgba(109,40,217,0.25);
      color: #ddd6fe;
      border: 1px solid rgba(167,139,250,0.55);
    }
    .btn-game:hover {
      background: rgba(109,40,217,0.38);
      border-color: var(--violet);
      color: #ede9fe;
      box-shadow: 0 0 30px rgba(167,139,250,0.3), 0 0 60px rgba(109,40,217,0.18);
    }

    .btn-icon {
      width: 13px; height: 13px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.88s forwards;
    }

    .footer-copy {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* ─── KEYFRAMES ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <div class="bg-violet-orb" aria-hidden="true"></div>
  <div class="bg-cyan-orb"   aria-hidden="true"></div>
  <div class="bg-grid"       aria-hidden="true"></div>
  <div class="bg-grain"      aria-hidden="true"></div>

  <div class="stage">

    <header>
      <div class="wordmark">Matt<em>.</em>Livingston</div>
      <div class="online"><span class="pulse-dot"></span>Online</div>
    </header>

    <main>

      <div class="logo-wrap">
        <div class="ring-outer"></div>
        <div class="ring-inner"></div>
        <div class="logo-disc">
          <img class="logo-img" src="ml-logo.jpeg" alt="Matt Livingston" />
        </div>
      </div>

      <h1 class="name"><span class="n-matt">Matt</span> <span class="n-l">L</span>ivingston</h1>

      <p class="tagline">
        <span class="titem">Web Developer</span><span class="sep">·</span><span class="titem">Tool Builder</span><span class="sep">·</span><span class="titem">Systems Designer</span>
      </p>

      <div class="rule"></div>

      <nav class="btn-group" aria-label="Site navigation">

        <a href="https://livingstontools.com" target="_blank" rel="noopener noreferrer" class="btn btn-cyan">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          Tools
        </a>

        <a href="/gravity-falls/" class="btn btn-violet">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          Gravity Falls
        </a>

        <a href="/gravity-falls/game/" class="btn btn-game">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="6" width="20" height="12" rx="2"/>
            <path d="M12 12h.01M7 12h.01"/>
            <path d="M17 9v6M14 12h6"/>
          </svg>
          Play the Game
        </a>

      </nav>

    </main>

    <footer>
      <span class="footer-copy">&copy; 2026 Matt Livingston</span>
    </footer>

  </div>

<!-- * lone wolf, quiet teeth | Matt Livingston -->
</body>
</html>
