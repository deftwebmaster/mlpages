<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sci-Fi Worldbuilder QA Harness</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <header class="shell-header">
      <button class="brand" id="homeButton" type="button">
        <span class="brand-mark" aria-hidden="true"></span>
        <span><strong>Sci-Fi Worldbuilder QA Harness</strong><small>Static validation page</small></span>
      </button>
      <div class="header-actions">
        <button class="ghost-button" id="settingsButton" type="button">Settings</button>
        <button class="ghost-button" id="aboutButton" type="button">About</button>
      </div>
    </header>
    <main id="app" class="app-shell"></main>
    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-header">
          <div><p class="eyebrow" id="modalEyebrow">QA</p><h2 id="modalTitle">QA</h2></div>
          <button class="icon-button" id="modalClose" type="button" aria-label="Close dialog">x</button>
        </header>
        <div class="modal-body" id="modalBody"></div>
      </section>
    </div>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/qa.js"></script>
  </body>
</html>
